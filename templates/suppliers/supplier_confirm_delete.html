{% extends 'base.html' %}
{% block title %}Supprimer le fournisseur{% endblock %}
{% block content %}
<h1>Supprimer le fournisseur "{{ object.nom }}"</h1>
<p>Êtes-vous sûr de vouloir supprimer ce fournisseur ?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Confirmer</button>
    <a href="{% url 'supplier_list' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
