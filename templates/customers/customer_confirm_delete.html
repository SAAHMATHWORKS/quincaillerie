{% extends 'base.html' %}
{% block title %}Supprimer le client{% endblock %}
{% block content %}
<h1>Supprimer le client "{{ object.nom }}"</h1>
<p>Êtes-vous sûr de vouloir supprimer ce client ?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Confirmer</button>
    <a href="{% url 'customer_list' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
