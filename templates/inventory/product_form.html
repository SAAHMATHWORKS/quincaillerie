{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{% if object %}Modifier{% else %}Créer{% endif %} un produit{% endblock %}
{% block content %}
<h1>{% if object %}Modifier{% else %}Créer{% endif %} un produit</h1>
<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary">Enregistrer</button>
    <a href="{% url 'product_list' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
