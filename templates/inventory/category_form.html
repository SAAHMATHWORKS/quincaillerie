{% extends 'base.html' %}
{% block title %}{% if object %}Modifier{% else %}Créer{% endif %} une catégorie{% endblock %}
{% block content %}
<h1>{% if object %}Modifier{% else %}Créer{% endif %} une catégorie</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Enregistrer</button>
    <a href="{% url 'category_list' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
