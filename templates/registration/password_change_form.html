{% extends 'base.html' %}
{% block title %}Changer mot de passe{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h2>Changer votre mot de passe</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Modifier</button>
        </form>
    </div>
</div>
{% endblock %}
